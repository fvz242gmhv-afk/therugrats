<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rugrats · Estadísticas WB</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #0f0f14;
      --surface:        #15151d;
      --surface2:       #1c1c28;
      --surface3:       #222232;
      --border:         rgba(124, 58, 237, 0.18);
      --border-bright:  rgba(124, 58, 237, 0.5);
      --accent:         #7c3aed;
      --accent-bright:  #a855f7;
      --accent-dim:     rgba(124, 58, 237, 0.14);
      --glow:           rgba(124, 58, 237, 0.4);
      --gold:           #f59e0b;
      --gold-glow:      rgba(245, 158, 11, 0.3);
      --silver:         #94a3b8;
      --bronze:         #c2731a;
      --text:           #dde3f0;
      --text-muted:     #5a6484;
      --font-display:   'Orbitron', monospace;
      --font-body:      'Exo 2', sans-serif;
      --font-mono:      'Share Tech Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,58,237,0.13) 0%, transparent 60%),
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.028) 1px, transparent 0);
      background-size: 100% 100%, 30px 30px;
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 36px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(124,58,237,0.07) 0%, transparent 100%);
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      font-size: 38px;
      filter: drop-shadow(0 0 10px var(--glow));
      animation: skull-pulse 3s ease-in-out infinite;
      user-select: none;
    }

    @keyframes skull-pulse {
      0%,100% { filter: drop-shadow(0 0 8px var(--glow)); }
      50%      { filter: drop-shadow(0 0 22px var(--accent-bright)); }
    }

    .logo-text h1 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0.22em;
      color: #fff;
      text-shadow: 0 0 28px var(--glow);
      line-height: 1;
    }

    .logo-text small {
      display: block;
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--accent-bright);
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 4px;
    }

    .hero-stat {
      text-align: center;
    }

    #total-events {
      display: block;
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 900;
      color: var(--accent-bright);
      text-shadow: 0 0 40px var(--glow);
      line-height: 1;
      transition: all 0.4s ease;
    }

    .hero-label {
      font-size: 10px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    #refresh-badge {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      letter-spacing: 0.03em;
    }

    #refresh-badge:hover {
      border-color: var(--accent);
      color: var(--accent-bright);
    }

    #refresh-badge.busy {
      color: var(--accent-bright);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-dim);
    }

    /* ── TABS ── */
    nav {
      display: flex;
      gap: 6px;
      padding: 16px 36px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }

    .tab {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 10px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .tab:hover {
      border-color: var(--border-bright);
      color: var(--text);
      background: var(--accent-dim);
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }

    /* ── MAIN ── */
    main {
      padding: 8px 36px 56px;
      max-width: 920px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active {
      display: block;
      animation: fade-up 0.3s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-title {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.35em;
      color: var(--accent-bright);
      text-transform: uppercase;
      margin: 20px 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-bright), transparent);
    }

    /* ── LEADERBOARD ── */
    .leaderboard { display: flex; flex-direction: column; gap: 8px; }

    .lb-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: fade-up 0.35s ease both;
    }

    .lb-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--border-bright);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .lb-item:hover { border-color: var(--border-bright); background: var(--surface2); transform: translateX(4px); }
    .lb-item:hover::before { opacity: 1; }

    .lb-item.r1 { border-color: rgba(245,158,11,0.28); background: rgba(245,158,11,0.045); }
    .lb-item.r1::before { background: var(--gold); opacity: 1; }
    .lb-item.r2 { border-color: rgba(148,163,184,0.28); background: rgba(148,163,184,0.035); }
    .lb-item.r2::before { background: var(--silver); opacity: 1; }
    .lb-item.r3 { border-color: rgba(194,115,26,0.28); background: rgba(194,115,26,0.04); }
    .lb-item.r3::before { background: var(--bronze); opacity: 1; }

    .rank-badge {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--surface3);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .rank-badge.gold   { background: rgba(245,158,11,0.14); color: var(--gold);   border-color: rgba(245,158,11,0.4);  box-shadow: 0 0 14px var(--gold-glow); font-size: 20px; }
    .rank-badge.silver { background: rgba(148,163,184,0.12); color: var(--silver); border-color: rgba(148,163,184,0.3); font-size: 20px; }
    .rank-badge.bronze { background: rgba(194,115,26,0.12);  color: var(--bronze); border-color: rgba(194,115,26,0.3);  font-size: 20px; }

    .lb-info { flex: 1; min-width: 0; }

    .lb-username {
      font-family: var(--font-mono);
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-item.r1 .lb-username { color: var(--gold); }
    .lb-item.r2 .lb-username { color: var(--silver); }
    .lb-item.r3 .lb-username { color: #d07a3a; }

    .lb-last {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      font-family: var(--font-mono);
    }

    .lb-count {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-bright);
      text-align: right;
      white-space: nowrap;
    }
    .lb-item.r1 .lb-count { color: var(--gold);   text-shadow: 0 0 18px var(--gold-glow); }
    .lb-item.r2 .lb-count { color: var(--silver); }
    .lb-item.r3 .lb-count { color: var(--bronze); }

    .lb-count-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-align: right;
      text-transform: uppercase;
      font-family: var(--font-body);
    }

    /* delay stagger */
    .lb-item:nth-child(1)  { animation-delay: .04s; }
    .lb-item:nth-child(2)  { animation-delay: .08s; }
    .lb-item:nth-child(3)  { animation-delay: .12s; }
    .lb-item:nth-child(4)  { animation-delay: .16s; }
    .lb-item:nth-child(5)  { animation-delay: .20s; }
    .lb-item:nth-child(6)  { animation-delay: .24s; }
    .lb-item:nth-child(7)  { animation-delay: .28s; }
    .lb-item:nth-child(8)  { animation-delay: .32s; }
    .lb-item:nth-child(9)  { animation-delay: .36s; }
    .lb-item:nth-child(10) { animation-delay: .40s; }

    /* ── EVENTS GRID ── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      transition: all 0.2s ease;
      animation: fade-up 0.35s ease both;
      position: relative;
      overflow: hidden;
    }

    .event-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .event-card:hover {
      border-color: var(--border-bright);
      background: var(--surface2);
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }

    .event-card:nth-child(1)  { animation-delay: .04s; }
    .event-card:nth-child(2)  { animation-delay: .08s; }
    .event-card:nth-child(3)  { animation-delay: .12s; }
    .event-card:nth-child(4)  { animation-delay: .16s; }
    .event-card:nth-child(5)  { animation-delay: .20s; }
    .event-card:nth-child(6)  { animation-delay: .24s; }
    .event-card:nth-child(7)  { animation-delay: .28s; }
    .event-card:nth-child(8)  { animation-delay: .32s; }

    .event-caller {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--accent-bright);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-date {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-bottom: 14px;
    }

    .event-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .ev-stat {
      background: var(--surface3);
      border-radius: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
    }

    .ev-stat-val {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .ev-stat-lbl {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    /* ── SKELETON ── */
    .skeleton { display: flex; flex-direction: column; gap: 8px; }

    .skel {
      height: 68px;
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
      position: relative;
    }

    .skel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.045) 50%, transparent);
      animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }
    .empty-icon { font-size: 44px; margin-bottom: 14px; display: block; opacity: 0.35; }
    .empty p { font-size: 13px; letter-spacing: 0.06em; }

    /* ── RESPONSIVE ── */
    @media (max-width: 580px) {
      header { padding: 16px 18px; }
      .logo-text h1 { font-size: 20px; }
      #total-events { font-size: 38px; }
      nav { padding: 10px 18px; }
      .tab { padding: 8px 14px; font-size: 11px; }
      main { padding: 4px 18px 40px; }
      .events-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">☠️</span>
      <div class="logo-text">
        <h1>RUGRATS</h1>
        <small>World Boss Tracker</small>
      </div>
    </div>
    <div class="hero-stat">
      <span id="total-events">—</span>
      <span class="hero-label">eventos totales</span>
    </div>
    <div id="refresh-badge" onclick="manualRefresh()">↻ Actualiza en 30s</div>
  </header>

  <nav>
    <button class="tab active" data-tab="callers">🎙️ Callers</button>
    <button class="tab" data-tab="members">👥 Participantes</button>
    <button class="tab" data-tab="scouts">🗺️ Scouts</button>
    <button class="tab" data-tab="events">📋 Eventos</button>
  </nav>

  <main>
    <section id="tab-callers" class="tab-panel active">
      <div class="panel-title">Ranking de Callers</div>
      <div id="callers-list" class="leaderboard">
        <div class="skeleton">
          <div class="skel"></div><div class="skel"></div>
          <div class="skel"></div><div class="skel"></div><div class="skel"></div>
        </div>
      </div>
    </section>

    <section id="tab-members" class="tab-panel">
      <div class="panel-title">Ranking de Participantes</div>
      <div id="members-list" class="leaderboard">
        <div class="skeleton">
          <div class="skel"></div><div class="skel"></div>
          <div class="skel"></div><div class="skel"></div><div class="skel"></div>
        </div>
      </div>
    </section>

    <section id="tab-scouts" class="tab-panel">
      <div class="panel-title">Ranking de Scouts</div>
      <div id="scouts-list" class="leaderboard">
        <div class="skeleton">
          <div class="skel"></div><div class="skel"></div>
          <div class="skel"></div><div class="skel"></div><div class="skel"></div>
        </div>
      </div>
    </section>

    <section id="tab-events" class="tab-panel">
      <div class="panel-title">Eventos Recientes</div>
      <div id="events-list" class="events-grid">
        <div class="skeleton" style="grid-column:1/-1">
          <div class="skel" style="height:120px;border-radius:12px"></div>
          <div class="skel" style="height:120px;border-radius:12px"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // ── UTILS ────────────────────────────────────
    const TZ = 'America/Argentina/Buenos_Aires';

    function fmt(iso) {
      if (!iso) return '—';
      try {
        return new Date(iso).toLocaleString('es-AR', {
          timeZone: TZ,
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit',
        }).replace(',', '');
      } catch { return '—'; }
    }

    function dur(comidas) {
      if (!comidas) return '—';
      const m = comidas * 30;
      const h = Math.floor(m / 60), min = m % 60;
      if (h && min) return `${h}h ${min}min`;
      return h ? `${h}h` : `${min}min`;
    }

    function esc(s) {
      return String(s ?? '—')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── RENDER LEADERBOARD ───────────────────────
    const MEDALS = ['🥇','🥈','🥉'];
    const M_CLASS = ['gold','silver','bronze'];
    const R_CLASS = ['r1','r2','r3'];

    function renderBoard(id, items, label) {
      const el = document.getElementById(id);
      if (!items?.length) {
        el.innerHTML = `<div class="empty"><span class="empty-icon">📭</span><p>No hay datos aún</p></div>`;
        return;
      }
      el.innerHTML = items.map((item, i) => {
        const top = i < 3;
        return `
          <div class="lb-item ${top ? R_CLASS[i] : ''}">
            <div class="rank-badge ${top ? M_CLASS[i] : ''}">${top ? MEDALS[i] : '#'+(i+1)}</div>
            <div class="lb-info">
              <div class="lb-username">${esc(item.username ?? item.userId)}</div>
              <div class="lb-last">Último: ${fmt(item.lastSeen)}</div>
            </div>
            <div>
              <div class="lb-count">${item.count}</div>
              <div class="lb-count-label">${label}</div>
            </div>
          </div>`;
      }).join('');
    }

    // ── RENDER EVENTS ─────────────────────────────
    function renderEvents(items) {
      const el = document.getElementById('events-list');
      if (!items?.length) {
        el.innerHTML = `<div class="empty"><span class="empty-icon">📭</span><p>No hay eventos aún</p></div>`;
        return;
      }
      el.innerHTML = items.map(ev => `
        <div class="event-card">
          <div class="event-caller">🎙️ ${esc(ev.caller?.username ?? ev.title)}</div>
          <div class="event-date">${fmt(ev.createdAt)}</div>
          <div class="event-stats">
            <div class="ev-stat">
              <div class="ev-stat-val">${ev.players ?? 0}/10</div>
              <div class="ev-stat-lbl">Jugadores</div>
            </div>
            <div class="ev-stat">
              <div class="ev-stat-val">${ev.scouts ?? 0}/4</div>
              <div class="ev-stat-lbl">Scouts</div>
            </div>
            <div class="ev-stat">
              <div class="ev-stat-val">${ev.comidas ?? '—'}</div>
              <div class="ev-stat-lbl">Comidas</div>
            </div>
            <div class="ev-stat">
              <div class="ev-stat-val" style="font-size:14px">${dur(ev.comidas)}</div>
              <div class="ev-stat-lbl">Duración</div>
            </div>
          </div>
        </div>`).join('');
    }

    // ── FETCH ────────────────────────────────────
    async function fetchData() {
      const badge = document.getElementById('refresh-badge');
      badge.classList.add('busy');
      badge.textContent = '↻ Cargando...';
      try {
        const res = await fetch('/api/stats');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();
        document.getElementById('total-events').textContent = d.totalEvents ?? 0;
        renderBoard('callers-list', d.topCallers, 'eventos');
        renderBoard('members-list', d.topMembers, 'participaciones');
        renderBoard('scouts-list',  d.topScouts,  'scouts');
        renderEvents(d.recentEvents);
      } catch (e) {
        console.error(e);
        badge.textContent = '✕ Sin conexión';
        const errHtml = `<div class="empty"><span class="empty-icon">⚠️</span><p>No se pudo conectar al servidor.<br>Asegurate de que el bot esté corriendo.</p></div>`;
        document.getElementById('callers-list').innerHTML = errHtml;
        document.getElementById('members-list').innerHTML = errHtml;
        document.getElementById('scouts-list').innerHTML  = errHtml;
        document.getElementById('events-list').innerHTML  = errHtml;
        setTimeout(() => badge.textContent = `↻ Actualiza en ${countdown}s`, 2000);
      } finally {
        badge.classList.remove('busy');
      }
    }

    // ── AUTO-REFRESH ─────────────────────────────
    let countdown = 30, timer = null;

    function startCountdown() {
      clearInterval(timer);
      countdown = 30;
      const badge = document.getElementById('refresh-badge');
      timer = setInterval(() => {
        countdown--;
        badge.textContent = `↻ Actualiza en ${countdown}s`;
        if (countdown <= 0) {
          clearInterval(timer);
          fetchData().then(startCountdown);
        }
      }, 1000);
    }

    async function manualRefresh() {
      clearInterval(timer);
      await fetchData();
      startCountdown();
    }

    // ── TABS ─────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      });
    });

    // ── INIT ─────────────────────────────────────
    fetchData().then(startCountdown);
  </script>
</body>
</html>
